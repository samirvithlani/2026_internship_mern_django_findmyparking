<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
{% csrf_token %}
<button id="rzp-button1">Pay Now</button>

<script>
document.getElementById('rzp-button1').onclick = async function(e) {
    e.preventDefault();
    const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    // 1. Call your Django view to create the order
    const response = await fetch('/parking/create-order/',{method:"POST",headers:{"X-CSRFToken":csrftoken},}); // Replace with your actual URL path
    const orderData = await response.json();
    console.log(orderData)

    // 2. Setup Razorpay options using data from your backend
    var options = {
        "key": "add yours", // Pass this from your Django context or hardcode test key
        "amount": orderData.amount, 
        "currency": orderData.currency,
        "name": "Your Company Name",
        "description": "Purchase Description",
        "order_id": orderData.id, // This is the important ID from your Python view
        "handler": async function (response) {
            // This runs after successful payment
            console.log("Payment successful:", response);
            
            const formData = new FormData();
            formData.append('razorpay_payment_id', response.razorpay_payment_id);
            formData.append('razorpay_order_id', response.razorpay_order_id);
            formData.append('razorpay_signature', response.razorpay_signature);

            // Optional: Fetch to another view to verify the signature on your server
            try {
                const verifyResponse = await fetch('/parking/verify-payment/', {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": csrftoken
                    },
                    body: formData
                });
                const verifyData = await verifyResponse.json();
                console.log("Verification result:", verifyData);
                
                if (verifyData.status === "success") {
                    alert("Payment successful!");
                    window.location.href = "/parking/user/"; // Redirect to dashboard or success page
                } else {
                    alert("Payment verification failed!");
                }
            } catch (error) {
                console.error("Verification error:", error);
                alert("An error occurred during verification.");
            }
        },
        "prefill": {
            "name": "Customer Name",
            "email": "customer@example.com"
        },
        "theme": {
            "color": "#3399cc"
        },
        "modal": {
            "ondismiss": function() {
                console.log("Checkout modal closed");
            }
        }
    };

    var rzp1 = new Razorpay(options);
    rzp1.open();
};
</script>
